name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build binary
        run: >
          uv run pyinstaller
          --onefile
          --windowed
          --name vipdf
          src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vipdf
          path: dist/vipdf
